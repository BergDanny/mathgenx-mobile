# Resolver for dynamic DNS resolution (Docker's internal DNS)
resolver 127.0.0.11 valid=30s ipv6=off;

# Use variable-based upstream to defer DNS resolution
upstream laravel {
    server app:9000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name mathgenx.trucode.com.my;
    root /var/www/public;
    index index.php index.html;

    return 301 https://$server_name$request_uri;

    # Laravel health check endpoint
    location /up {
        try_files $uri /index.php?$query_string;
        root /var/www/public;
        fastcgi_pass laravel;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param REQUEST_URI $request_uri;
    }

    # Frontend assets (JS, CSS, etc.) - ^~ gives priority over regex locations
    location ^~ /assets {
        root /var/www/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Frontend icons
    location ^~ /icon/ {
        root /var/www/frontend;
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Frontend logos
    location ^~ /logos {
        root /var/www/frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
        root /var/www/frontend;
    }

    # Laravel API routes
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
        root /var/www/public;
        
        # Rate limiting for API
        limit_req zone=api_limit burst=20 nodelay;
        
        # Proxy to PHP-FPM
        fastcgi_pass laravel;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Headers
        fastcgi_param HTTP_HOST $host;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param QUERY_STRING $query_string;
    }

    # Laravel public files (assets, images, etc.)
    location ~* \.(jpg|jpeg|gif|png|css|js|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/public;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Laravel PHP files
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass laravel;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Increase timeouts for long-running requests
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to storage and bootstrap cache
    location ~ ^/(storage|bootstrap/cache) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

}

# SSL Configuration
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mathgenx.trucode.com.my;
    root /var/www/public;
    index index.php index.html;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Laravel health check endpoint
    location /up {
        try_files $uri /index.php?$query_string;
        root /var/www/public;
        fastcgi_pass laravel;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
