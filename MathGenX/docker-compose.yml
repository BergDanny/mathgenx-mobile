services:
  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: mathgenx_db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-mathgenx}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME:-mathgenx}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - mathgenx-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        user: ${USER:-www-data}
        uid: ${UID:-1000}
    container_name: mathgenx_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - mathgenx-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-mathgenx}
      - DB_USERNAME=${DB_USERNAME:-mathgenx}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-mathgenx_strong!}
      - RAG_API_URL=http://rag-api:8000/api/rag-generate
      - CHATBOT_API_URL=http://rag-api:8000/api/chatbot-help

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: mathgenx_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./mathgenx-web/dist:/var/www/frontend
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./docker/nginx/auth:/etc/nginx/auth
    networks:
      - mathgenx-network
    depends_on:
      app:
        condition: service_started
    command: >
      sh -c "
      apk add --no-cache netcat-openbsd > /dev/null 2>&1 || true &&
      echo 'Waiting for app service to be ready...' &&
      until nc -z app 9000 2>/dev/null; do
        echo 'Waiting for app:9000...'
        sleep 2
      done &&
      echo 'App service is ready! Starting nginx...' &&
      nginx -g 'daemon off;'
      "

  # Vue.js Frontend Service
  frontend:
    build:
      context: ./mathgenx-web
      dockerfile: ../docker/frontend/Dockerfile
    container_name: mathgenx_frontend
    restart: unless-stopped
    volumes:
      - ./mathgenx-web/dist:/usr/share/nginx/html
    networks:
      - mathgenx-network

  # FastAPI RAG Service
  rag-api:
    build:
      context: ${RAG_API_PATH:-../mathgenx-ai-prototype}
      dockerfile: Dockerfile
    container_name: mathgenx_rag_api
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ${RAG_API_PATH:-../mathgenx-ai-prototype}:/app
      - rag_data:/app/data
    networks:
      - mathgenx-network
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: mathgenx_redis
    restart: unless-stopped
    # Port removed - Redis only accessible via Docker network (more secure)
    # ports:
    #   - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - mathgenx-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-mathgenx_strong!}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-mathgenx_strong!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  mathgenx-network:
    driver: bridge

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  rag_data:
    driver: local

